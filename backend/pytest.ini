[pytest]
# Discover tests inside the tests/ subdirectory.
testpaths = tests

# Standard naming conventions.
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Stream log output to the terminal in real time so CI logs show progress
# for long-running tests (LLM calls, MCP round-trips).
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s

# Custom markers so tests can be targeted selectively.
# Run only integration tests:   pytest -m integration
# Skip integration tests:       pytest -m "not integration"
markers =
    integration: marks tests that require live external services
                 (MCP server, Pinecone, Groq).  These are skipped
                 automatically when the required env vars are absent.
